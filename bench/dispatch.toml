# SCPN-MIF-CORE — multi-language dispatch table.
#
# Per `feedback_fallback_chain_ordering.md`: backends are ordered
# fastest-measured-first using the benchmark JSON in `bench/results/`.
# This file is regenerated by `tools/update_dispatch.py` after every
# benchmark campaign. Manual edits are blocked by the preflight gate.

schema_version = "1.0.0"
last_updated = "2026-06-04T0918"
benchmark_host = "i5-11600K (mining rig)"

[kernels]
# Map: kernel name -> ordered backend list.
# Order is the dispatch precedence. Entries below are placeholders that
# point at the Python reference until each kernel is benchmarked.
"kinematic.doppler_kuramoto"          = ["python"]
"kinematic.moving_frame_upde"         = ["python"]
"kinematic.merge_window"              = ["python"]
"lifecycle.pulsed_shot_fsm"           = ["python"]
# MIF-005 capacitor bank: measured Rust speedup is 75x on the single
# Crank-Nicolson step and 171x on the 1 000-step batch versus the NumPy
# reference on the local i5-11600K rig (see bench/results/capacitor_bank.json),
# so Rust is the fastest measured backend.
"lifecycle.capacitor_bank" = ["rust", "python"]
"aer.spike_buffer"                    = ["python"]
"aer.decode_rate"                     = ["python"]
"physics.frc_rigid_rotor"             = ["python"]
"physics.faraday_back_emf" = ["rust", "python"]
"physics.faraday_recovery_waveform" = ["python", "rust", "julia"]
# I/O hardening trio (MIF-016, MIF-017, MIF-018) — registered for the
# multi-language dispatch from P1 prototype onward.
"diagnostics.normalisation"           = ["python"]    # MIF-016
"diagnostics.stress_inject"           = ["python"]    # MIF-017
"daq.udp_multicast_mock"              = ["python"]    # MIF-018
"daq.pcie_dma_ring_mock"              = ["python"]    # MIF-018
