# SCPN-MIF-CORE — multi-language dispatch table.
#
# Per `feedback_fallback_chain_ordering.md`: backends are ordered
# fastest-measured-first using the benchmark JSON in `bench/results/`.
# This file is regenerated by `tools/update_dispatch.py` after every
# benchmark campaign. Manual edits are blocked by the preflight gate.

schema_version = "1.0.0"
last_updated = "2026-07-07T1200"
benchmark_host = "i5-11600K (mining rig)"

[kernels]
# Map: kernel name -> ordered backend list.
# Order is the dispatch precedence. Entries below are placeholders that
# point at the Python reference until each kernel is benchmarked.
# MIF-001 Doppler-Kuramoto: Rust is fastest for the 3-oscillator
# derivative, 120-step RK4 trace, and affine omega(t) trace on the local
# i5-11600K rig (see bench/results/doppler_kuramoto.json). The compiled Mojo
# derivative is a subprocess CLI surface (tolerance-aware parity, ~1 ULP): its
# per-call process spawn places it behind the in-process backends but ahead of
# the Julia CLI; it is a measured/parity surface, not the runtime hot path.
"kinematic.doppler_kuramoto" = ["rust", "python", "mojo", "julia"]
"kinematic.sampled_safety_certificate" = ["rust", "python", "julia"]    # MIF-011
# MIF-002 moving-frame UPDE: Rust is fastest for the 2-body combined
# derivative, 120-step RK45 trace, and affine omega(t) moving-frame trace
# on the same rig.
"kinematic.moving_frame_upde" = ["rust", "python", "julia"]
"kinematic.merge_window" = ["rust", "python", "julia"]
# Causal streaming merge-trigger (per-sample push): Rust is fastest through the
# PyO3 surface; the in-process Rust per-push cost is measured separately by the
# mif-kinematic criterion bench (see bench/results/streaming_trigger.json notes).
"kinematic.streaming_trigger" = ["rust", "python"]
# Probabilistic trigger propagation (P(lock)/P(violation) operating point):
# Rust is fastest for both the 64-sample per-shot planning call and the
# 4096-sample campaign trace over a zero-copy column boundary (see
# bench/results/trigger_probability.json notes).
"kinematic.trigger_probability" = ["rust", "python"]
"lifecycle.pulsed_shot_fsm" = ["rust", "python"]
"lifecycle.plasmoid_merger_petri_net" = ["rust", "python"]
# Independently seeded MIF-012 verification campaigns: Rust runs the trials on
# the rayon pool, the Python floor sequentially; reports are bit-identical (see
# bench/results/merger_campaign.json notes).
"lifecycle.merger_campaign" = ["rust", "python"]
# MIF-005 capacitor bank: Rust is fastest for the single Crank-Nicolson step,
# 1 000-step batch, and analytical free-response groups. Julia is measured via
# CLI startup and remains a research-reference backend, not the runtime path.
"lifecycle.capacitor_bank" = ["rust", "python", "julia"]
"aer.spike_buffer" = ["rust", "python", "julia"]
# The Mojo rate-decode is a compiled subprocess CLI surface (bit-exact parity): it sits
# behind the in-process backends but ahead of the Julia CLI; a measured/parity surface.
"aer.decode_rate" = ["rust", "python", "mojo", "julia"]
"physics.faraday_back_emf" = ["rust", "python"]
# The Mojo recovery-waveform is a compiled subprocess CLI surface (tolerance-aware ~1 ULP
# on the product-rule sum, bit-exact flux): behind in-process backends, ahead of Julia.
"physics.faraday_recovery_waveform" = ["rust", "python", "mojo", "julia"]
# I/O hardening trio (MIF-016, MIF-017, MIF-018) — registered for the
# multi-language dispatch from P1 prototype onward.
"diagnostics.normalisation" = ["rust", "python", "julia"]    # MIF-016
"diagnostics.stress_inject" = ["rust", "python", "julia"]    # MIF-017
"daq.udp_multicast_mock" = ["rust", "python", "go"]    # MIF-018
"daq.pcie_dma_ring_mock" = ["rust", "python", "go"]    # MIF-018
