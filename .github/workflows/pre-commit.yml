# SCPN-MIF-CORE — Pre-commit
name: Pre-commit

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

permissions: {}

concurrency:
  group: pre-commit-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Install project, dev tools, and pre-commit
        # The `mypy-strict`, `sync-tag linter`, and `secret-pattern scan` local
        # hooks run with `language: system`; they need mypy, numpy, and the
        # importable package on PATH, so install the dev extra alongside
        # pre-commit rather than pre-commit alone.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pre-commit
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure
