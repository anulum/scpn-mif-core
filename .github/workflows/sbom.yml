# SCPN-MIF-CORE — SBOM (software bill of materials)
name: SBOM Generation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-sbom:
    name: CycloneDX Python SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -m pip install cyclonedx-bom
      - name: Generate Python SBOM
        run: |
          mkdir -p artifacts
          cyclonedx-py environment -o artifacts/sbom-python.cdx.json --spec-version 1.5 --output-format JSON
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: sbom-python
          path: artifacts/sbom-python.cdx.json

  rust-sbom:
    name: CycloneDX Rust SBOM
    defaults:
      run:
        working-directory: scpn-mif-rs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - run: |
          mkdir -p ../artifacts/sbom-rust
          cargo install cargo-cyclonedx --locked
          cargo cyclonedx --format json --spec-version 1.5
          find . -name '*.cdx.json' -exec cp {} ../artifacts/sbom-rust/ \;
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: sbom-rust
          path: artifacts/sbom-rust/

  attach-release-assets:
    if: github.event_name == 'release'
    needs: [python-sbom, rust-sbom]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: sbom-python
          path: artifacts
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: sbom-rust
          path: artifacts
      - name: Attach SBOMs to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t sboms < <(find artifacts -name '*.cdx.json')
          gh release upload "${GITHUB_REF_NAME}" "${sboms[@]}" --clobber
