# SPDX-License-Identifier: AGPL-3.0-or-later
name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: |
          python -m pip install --upgrade pip build
          pip install -e ".[dev]"
      - name: Verify version pin
        run: |
          VERSION_TAG="${GITHUB_REF_NAME#v}"
          VERSION_PY=$(python -c "import scpn_mif_core; print(scpn_mif_core.__version__)")
          if [ "$VERSION_TAG" != "$VERSION_PY" ]; then
            echo "tag $VERSION_TAG does not match package $VERSION_PY"
            exit 1
          fi
      - run: python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/scpn-mif-core
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*
