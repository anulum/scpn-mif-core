# SPDX-License-Identifier: AGPL-3.0-or-later
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (lint + type + test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Install Rust 1.85
        run: |
          rustup toolchain list | grep -q '^1\.85\.0' || rustup toolchain install 1.85.0 --profile minimal
          rustup default 1.85.0
      - name: Build Rust extension
        env:
          RUSTUP_TOOLCHAIN: "1.85.0"
        run: pip install ./scpn-mif-rs/crates/mif-ffi
      - name: Install studio platform SDK
        # The studio vertical (scpn_mif_core.studio) consumes the published
        # scpn-studio-platform SDK; install it on this gate job so mypy and the 100%
        # coverage gate see it and tests/unit/studio/ executes (it importorskips
        # where the SDK is absent) and the studio modules are covered.
        run: pip install 'scpn-studio-platform>=0.2,<0.3'
      - name: ruff check
        run: ruff check src/ tests/ bench/ tools/
      - name: ruff format
        run: ruff format --check src/ tests/ bench/ tools/
      - name: mypy
        run: mypy src/scpn_mif_core/ tools/ cosim/ examples/
      - name: bandit
        run: bandit -r src/scpn_mif_core/ -c pyproject.toml -q
      - name: pytest (full tree under the 100% coverage gate)
        run: pytest tests/ --cov=scpn_mif_core --cov=tools --cov-report=xml --cov-report=term
      - name: Install Verilator for cosimulation
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends verilator
      - name: cosim (bit-true Python vs Verilator, 100% harness coverage gate)
        run: >
          pytest cosim/ -o addopts=""
          --cov=cosim --cov-report=term-missing --cov-fail-under=100
          -p no:nengo -p no:randomly
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: coverage-${{ github.sha }}
          path: coverage.xml
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
        with:
          files: coverage.xml
          flags: python
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: scpn-mif-rs
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
        with:
          toolchain: 1.85.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
        with:
          workspaces: scpn-mif-rs
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace --all-features

  sync-tags:
    name: Cross-repo sync-tag linter
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - run: python tools/check_sync_tags.py --root .

  secrets:
    name: Secret-pattern scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
      - run: python tools/check_secrets.py --tree .

  studio-web:
    name: Studio web (Module Federation remote)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: studio-web
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "22"
      - name: Enable pnpm
        run: corepack enable && corepack prepare pnpm@11.2.2 --activate
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm format:check
      - name: Tests + 100% coverage gate
        run: pnpm exec vitest run --coverage
      - name: Build (Module Federation remote)
        run: pnpm build
