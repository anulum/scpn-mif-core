# SPDX-License-Identifier: AGPL-3.0-or-later
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (lint + type + test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Install Rust 1.85
        run: |
          rustup toolchain list | grep -q '^1\.85\.0' || rustup toolchain install 1.85.0 --profile minimal
          rustup default 1.85.0
      - name: Build Rust extension
        env:
          RUSTUP_TOOLCHAIN: "1.85.0"
        run: pip install ./scpn-mif-rs/crates/mif-ffi
      - name: ruff check
        run: ruff check src/ tests/ bench/ tools/
      - name: ruff format
        run: ruff format --check src/ tests/ bench/ tools/
      - name: mypy
        run: mypy src/scpn_mif_core/ tools/
      - name: bandit
        run: bandit -r src/scpn_mif_core/ -c pyproject.toml -q
      - name: pytest
        run: pytest tests/unit/ -v --cov=scpn_mif_core --cov-report=xml --cov-report=term
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.sha }}
          path: coverage.xml

  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: scpn-mif-rs
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: scpn-mif-rs
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace --all-features

  sync-tags:
    name: Cross-repo sync-tag linter
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python tools/check_sync_tags.py --root .

  secrets:
    name: Secret-pattern scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python tools/check_secrets.py --tree .
