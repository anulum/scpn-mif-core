# SCPN-MIF-CORE — Security audit lane
name: Security Audit

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-dependency-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -m pip install --no-deps pip-audit
      - name: Capture requirements and run pip-audit
        run: |
          mkdir -p artifacts
          python -m pip freeze --all > artifacts/pip-freeze.txt
          python - <<'PY'
          from pathlib import Path
          src = Path('artifacts/pip-freeze.txt')
          dst = Path('artifacts/pip-audit-requirements.txt')
          lines = []
          for raw in src.read_text(encoding='utf-8').splitlines():
              line = raw.strip()
              if not line or line.startswith('-e '):
                  continue
              if ' @ file://' in line.lower() or line.startswith('scpn-mif-core@'):
                  continue
              lines.append(line)
          dst.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print(f'Wrote {len(lines)} requirements for pip-audit')
          PY
          pip-audit -r artifacts/pip-audit-requirements.txt --desc --format json --output artifacts/pip-audit.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-python-audit
          path: artifacts/pip-audit.json

  rust-dependency-audit:
    name: Rust dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scpn-mif-rs
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: |
          cargo install cargo-audit --version 0.22.1 --locked
      - name: Run cargo-audit
        run: |
          mkdir -p ../artifacts
          cargo audit --json > ../artifacts/cargo-audit.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-rust-audit
          path: artifacts/cargo-audit.json
