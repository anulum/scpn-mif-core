# SCPN-MIF-CORE — Security audit lane
name: Security Audit

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-dependency-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Install the project (the dependency set to audit)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Capture the project requirements
        run: |
          mkdir -p artifacts
          python -m pip freeze --all > artifacts/pip-freeze.txt
          python - <<'PY'
          from pathlib import Path
          src = Path('artifacts/pip-freeze.txt')
          dst = Path('artifacts/pip-audit-requirements.txt')
          lines = []
          for raw in src.read_text(encoding='utf-8').splitlines():
              line = raw.strip()
              if not line or line.startswith('-e '):
                  continue
              if ' @ file://' in line.lower() or line.startswith('scpn-mif-core@'):
                  continue
              lines.append(line)
          dst.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          print(f'Wrote {len(lines)} requirements for pip-audit')
          PY
      - name: Install pip-audit and audit the requirements
        run: |
          # pip-audit audits a requirements file, so its own runtime dependencies
          # must be present (the previous --no-deps form left it unable to import
          # requests and crashed). They do not pollute the audited set because the
          # requirements were captured in the step above, before this install.
          python -m pip install pip-audit
          pip-audit -r artifacts/pip-audit-requirements.txt --desc --format json --output artifacts/pip-audit.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: security-python-audit
          path: artifacts/pip-audit.json

  rust-dependency-audit:
    name: Rust dependency audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scpn-mif-rs
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - name: Install cargo-audit
        run: |
          cargo install cargo-audit --version 0.22.1 --locked
      - name: Run cargo-audit
        run: |
          mkdir -p ../artifacts
          # RUSTSEC-2024-0436: the `paste` proc-macro crate is unmaintained
          # (informational advisory, no patched version). It is a transitive
          # build-time dependency via nalgebra -> simba and cannot be removed
          # without dropping nalgebra; accepted until the upstream numerics stack
          # migrates off it. New advisories are still surfaced.
          cargo audit --ignore RUSTSEC-2024-0436 --json > ../artifacts/cargo-audit.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: always()
        with:
          name: security-rust-audit
          path: artifacts/cargo-audit.json
