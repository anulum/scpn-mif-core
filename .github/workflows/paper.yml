# SPDX-License-Identifier: AGPL-3.0-or-later
name: JOSS paper draft

on:
  push:
    branches: [main]
    paths:
      - "docs/submissions/**"
      - ".github/workflows/paper.yml"
  pull_request:
    paths:
      - "docs/submissions/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  draft:
    name: Build JOSS draft PDF
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@85a18372e48f551d8af9ddb7a747de685fbbb01c  # master 2024-07-17
        with:
          journal: joss
          paper-path: docs/submissions/joss/paper.md
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: paper
          path: docs/submissions/joss/paper.pdf
