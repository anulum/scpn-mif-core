# SPDX-License-Identifier: AGPL-3.0-or-later
name: Formal verification

on:
  push:
    branches: [main]
    paths:
      - "hdl/**"
      - "lean/**"
      - ".github/workflows/formal.yml"
  pull_request:
    paths:
      - "hdl/**"
      - "lean/**"
      - ".github/workflows/formal.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  symbiyosys:
    name: SymbiYosys (Yosys + z3)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - name: Install OSS CAD Suite (Yosys + SymbiYosys + z3)
        uses: YosysHQ/setup-oss-cad-suite@c7845bc0d335c8076aa22047e85972caa8a916df  # v4
      - name: Check formal proof-status manifest is current
        run: python3 tools/formal_manifest.py --check
      - name: Run MIF-010 property suites
        run: python3 tools/run_formal.py --suite all

  lean:
    name: Lean 4 + mathlib4
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch' || contains(github.event.pull_request.changed_files, 'lean/')
    env:
      MIF_LEAN_CI: "1"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: leanprover/lean-action@38fbc41a8c28c4cbaec22d7f7de508ec2e7c0dd9  # v1
        with:
          lake-version: latest
      - name: lake build
        working-directory: lean
        run: lake update && lake build
