# SPDX-License-Identifier: AGPL-3.0-or-later
name: Upstream nightly compatibility

# Daily check of each sibling repository's current `main` against the MIF
# cross-repository contract suite.
#
# The dynamic compatibility report (`scpn_mif_core.ecosystem`) inspects sibling
# *source trees* found under `SCPN_MIF_ECOSYSTEM_ROOT`, so each sibling is
# checked out there and installed from that `main` checkout for the
# runtime-import surfaces. Selection is by a per-sibling marker (test names use
# underscores, repository names use hyphens, so a hyphenated `-k` filter matches
# nothing). A sibling that cannot be checked out — for example after a
# visibility change without a `SIBLING_CHECKOUT_TOKEN` — is skipped, not failed;
# a genuine contract regression fails the job and opens a drift issue.
# See `docs/internal/bidirectional_sync_protocol.md`.

on:
  schedule:
    - cron: "17 3 * * *"   # 03:17 UTC daily
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  contract-trial:
    name: Contract ${{ matrix.sibling.repo }}@main
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        sibling:
          - { repo: sc-neurocore,            dir: SC-NEUROCORE,            marker: sc_neurocore }
          - { repo: scpn-phase-orchestrator, dir: SCPN-PHASE-ORCHESTRATOR, marker: scpn_phase_orchestrator }
          - { repo: scpn-control,            dir: SCPN-CONTROL,            marker: scpn_control }
          - { repo: scpn-fusion-core,        dir: SCPN-FUSION-CORE,        marker: scpn_fusion_core }
          - { repo: scpn-quantum-control,    dir: SCPN-QUANTUM-CONTROL,    marker: scpn_quantum_control }
    steps:
      - name: Checkout MIF
        uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install MIF with dev tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Checkout ${{ matrix.sibling.repo }}@main source tree
        id: sibling
        uses: actions/checkout@v5
        continue-on-error: true
        with:
          repository: anulum/${{ matrix.sibling.repo }}
          ref: main
          path: _siblings/${{ matrix.sibling.dir }}
          token: ${{ secrets.SIBLING_CHECKOUT_TOKEN || github.token }}

      - name: Skip when the sibling is unavailable
        if: steps.sibling.outcome != 'success'
        run: |
          echo "::notice title=Sibling unavailable::${{ matrix.sibling.repo }}@main could not be checked out; contract test skipped (infrastructure, not contract drift)."

      - name: Install ${{ matrix.sibling.repo }}@main for runtime-import surfaces
        if: steps.sibling.outcome == 'success'
        run: |
          pip install "./_siblings/${{ matrix.sibling.dir }}" \
            || echo "::warning title=Sibling not installable::${{ matrix.sibling.repo }}@main is not pip-installable; only source-tree contract surfaces are checked."

      - name: Run ${{ matrix.sibling.repo }} contract tests
        if: steps.sibling.outcome == 'success'
        env:
          SCPN_MIF_ECOSYSTEM_ROOT: ${{ github.workspace }}/_siblings
        run: pytest tests/contract/ -q --no-cov -m "contract and ${{ matrix.sibling.marker }}"

      - name: Open drift issue on contract regression
        if: failure()
        uses: actions/github-script@v9
        env:
          SIBLING: ${{ matrix.sibling.repo }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const title = `Upstream drift: ${process.env.SIBLING}@main breaks the MIF contract`;
            const body = `The nightly compatibility job at ${process.env.RUN_URL} found a contract ` +
                         `regression for sibling \`${process.env.SIBLING}\`. Inspect the contract test ` +
                         `output and update the MIF spec or the sibling per the bidirectional sync protocol.`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['upstream-drift'],
            });
