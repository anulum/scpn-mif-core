# SCPN-MIF-CORE — nightly multi-language benchmark campaign.
#
# Deliberately not part of per-commit CI. Runs the pytest-benchmark kernel
# suite (which times both the Python reference and the rust-ext acceleration
# path) on a nightly schedule, archiving the JSON for trend tracking. Hosted
# runners are shared, so these numbers are functional/regression evidence, not
# isolated-core production benchmarks.
name: Benchmark nightly

on:
  schedule:
    - cron: "29 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: benchmark-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Install Rust 1.85
        run: |
          rustup toolchain list | grep -q '^1\.85\.0' || rustup toolchain install 1.85.0 --profile minimal
          rustup default 1.85.0
      - name: Build Rust extension
        env:
          RUSTUP_TOOLCHAIN: "1.85.0"
        run: pip install ./scpn-mif-rs/crates/mif-ffi
      - name: Run benchmark kernels
        run: >
          pytest bench/ --benchmark-only --no-cov -o python_files="bench_*.py"
          --benchmark-json=bench/results/nightly.json
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: benchmark-${{ github.sha }}
          path: bench/results/nightly.json
