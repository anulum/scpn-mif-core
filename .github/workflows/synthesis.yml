# SPDX-License-Identifier: AGPL-3.0-or-later
name: Synthesis (Vivado, self-hosted)

on:
  # No daily schedule: the self-hosted Vivado runner is not always online,
  # and a scheduled run with no runner queues for 24 h and is then cancelled,
  # which only adds noise. Run on HDL pull requests and on demand instead.
  pull_request:
    paths:
      - "hdl/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vivado-zu3eg:
    name: Vivado batch — ZU3EG
    runs-on: [self-hosted, vivado-2024-2]
    if: contains(github.event.pull_request.labels.*.name, 'synth-required') || github.event_name == 'workflow_dispatch'
    timeout-minutes: 180
    env:
      MIF_VIVADO_CI: "1"
    steps:
      - uses: actions/checkout@v5
      - name: vivado -mode batch -source build_zu3eg.tcl
        working-directory: hdl/targets/ultrascale_plus
        run: |
          if [ -f build_zu3eg.tcl ]; then
            vivado -mode batch -source build_zu3eg.tcl
          else
            echo "build_zu3eg.tcl not yet present (P3)"
          fi
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zu3eg-reports-${{ github.sha }}
          path: hdl/reports/ultrascale_plus/
          if-no-files-found: ignore
