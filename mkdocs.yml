# Description: MkDocs configuration for the public documentation site.

site_name: SCPN-MIF-CORE
site_description: >-
  Deterministic phase synchronisation and hardware synthesis for high-beta
  pulsed magneto-inertial fusion plasmas.
site_url: https://anulum.github.io/scpn-mif-core/
repo_url: https://github.com/anulum/scpn-mif-core
repo_name: anulum/scpn-mif-core
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.sections
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow

plugins:
  - search
  - include-markdown
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            merge_init_into_class: true
            show_if_no_docstring: false
            signature_crossrefs: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/anulum/scpn-mif-core
  generator: false

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Architecture:
      - architecture/index.md
  - API:
      - api/index.md
      - Kinematic:
          - Doppler-Kuramoto: api/kinematic/doppler_kuramoto.md
          - Moving-frame UPDE: api/kinematic/moving_frame_upde.md
          - Merge-window monitor: api/kinematic/merge_window.md
      - Lifecycle:
          - Pulsed-shot FSM: api/lifecycle/pulsed_shot_fsm.md
          - Capacitor bank: api/lifecycle/capacitor_bank.md
          - Plasmoid-merger Petri net: api/lifecycle/plasmoid_merger_petri_net.md
      - Physics:
          - Faraday recovery: api/physics/faraday_recovery.md
      - Formal:
          - Capacitor-bank energy: api/formal/capacitor_bank.md
          - Faraday recovery energy: api/formal/faraday_recovery.md
          - Kinematic safety: api/formal/kinematic_safety.md
          - Plasmoid-merger Petri net: api/formal/plasmoid_merger_petri_net.md
      - FPGA:
          - ADC-to-spike quantiser: api/fpga/adc_to_spike_quantiser.md
  - Papers: papers/index.md

